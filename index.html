<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dịch Thuật Du Lịch</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌐</text></svg>">
</head>
<body>
    <div class="screen-container">
        <div class="content-scroll">
            <div class="app-container">
                <header>
                    <h1 class="glow-title">Dịch Thuật Du Lịch</h1>
                </header>

                <div class="button-group">
                    <button id="btnAnhViet" class="lang-btn">Anh-Việt</button>
                    <button id="btnVietAnh" class="lang-btn">Việt-Anh</button>
                </div>

                <div class="button-group">
                    <button id="btnTrungViet" class="lang-btn">Trung-Việt</button>
                    <button id="btnVietTrung" class="lang-btn">Việt-Trung</button>
                </div>

                <div class="button-group">
                    <button id="btnAnDoViet" class="lang-btn">Ấn-Việt</button>
                    <button id="btnVietAnDo" class="lang-btn">Việt-Ấn</button>
                </div>

                <div class="button-group">
                    <button id="btnMalaiViet" class="lang-btn">Malai-Việt</button>
                    <button id="btnVietMalai" class="lang-btn">Việt-Malai</button>
                </div>

                <div class="button-group">
                    <button id="btnPhapViet" class="lang-btn">Pháp-Việt</button>
                    <button id="btnVietPhap" class="lang-btn">Việt-Pháp</button>
                </div>

                <div class="history-toolbar">
                    <span id="historyCount" class="history-count">0 tin nhắn</span>
                    <button id="clearHistoryBtn" class="clear-btn">🗑️ Xóa lịch sử</button>
                </div>

                <div class="history-panel">
                    <div class="history-header">Lịch sử hội thoại</div>
                    <div id="historyList" class="history-list">
                        <div class="empty-history">Chưa có dữ liệu. Nhấn vào nút bên trên để bắt đầu.</div>
                    </div>
                </div>

                <footer class="app-footer">
                    Thiết Kế Trần Cường - Zalo: 0907860662
                </footer>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });
        document.addEventListener('selectstart', function(e) {
            e.preventDefault();
            return false;
        });
        document.addEventListener('dragstart', function(e) {
            e.preventDefault();
            return false;
        });
    </script>

    <script src="tienganh.js"></script>
    <script src="tiengtrung.js"></script>
    <script src="tiengando.js"></script>
    <script src="tiengmalai.js"></script>
    <script src="tiengphap.js"></script>
	<script src="config.js"></script>
    <script src="script.js"></script>
    
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('SW registered:', reg))
                .catch(err => console.log('SW error:', err));
        }
    </script>
</body>
</html>
